esphome:
  name: esphome-web-b043bc
  friendly_name: Sonoff1
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

web_server:
  port: 80

# External component configuration
external_components:
  - source:
      type: local
      path: components
    components: [ interrupt_pwm ]

time:
  - platform: homeassistant
    id: homeassistant_time
  - platform: sntp
    id: sntp_time
    on_time:
      # At 23:00 every night, start gradual dimming if the light is already on
      - seconds: 0
        minutes: 0
        hours: 23
        then:
          - if:
              condition:
                light.is_on: dual_led
              then:
                - script.execute: gradual_dim

# Import remote control codes
#<<: !include remote_codes.yaml

# Global variables for timer functionality
globals:
  - id: timer_stage
    type: int
    restore_value: no
    initial_value: '0'
  
  - id: current_brightness
    type: float
    restore_value: yes
    initial_value: '1.0'
  
  - id: last_remote_time
    type: unsigned long
    restore_value: no
    initial_value: '0'
  
  - id: last_nec_command
    type: uint32_t
    restore_value: no
    initial_value: '0'

output:
#  - platform: esp8266_pwm
#    id: led1_output
#    pin: GPIO5
#    frequency: 1000Hz
#  - platform: esp8266_pwm
#    id: led2_output
#    pin: GPIO4
#    frequency: 1000Hz

  - platform: interrupt_pwm
    id: led1_output
    pin: 5
    channel: 0
    zero_means_zero: true
    min_power: 0.0005

  - platform: interrupt_pwm
    id: led2_output
    pin: 4
    channel: 1
    zero_means_zero: true
    min_power: 0.0005

  - platform: template
    id: combined_output
    type: float
    write_action:
      - output.set_level:
          id: led1_output
          level: !lambda 'return state / 2.0;'
      - output.set_level:
          id: led2_output
          level: !lambda 'return state / 2.0;'

# Status LED on GPIO13
  - platform: gpio
    pin: GPIO13
    id: led_output
    inverted: true

light:
  - platform: binary
    name: "Status LED"
    id: status_led
    output: led_output

# Individual lights (hidden)
  - platform: monochromatic
    id: led1
    output: led1_output
    internal: true
    gamma_correct: 1.0

  - platform: monochromatic
    id: led2
    output: led2_output
    internal: true
    gamma_correct: 1.0

  # Main light
  - platform: monochromatic
    name: "Dual LED Light"
    id: dual_led
    output: combined_output
    gamma_correct: 1.8
    restore_mode: RESTORE_DEFAULT_OFF
    
    on_turn_on:
      then:
        - lambda: |-
            auto time = id(sntp_time).now();
            if (!time.is_valid()) return;
            int hour = time.hour;
            bool is_night = (hour >= 23 || hour < 6);
            if (is_night) {
              id(gradual_dim).execute();
            }
    on_turn_off:
      then:
        # Clean turn-off handler
        - script.stop: gradual_dim
        # Force both LEDs off immediately
        - light.turn_off: led1
        - light.turn_off: led2
        - output.turn_off: led1_output
        - output.turn_off: led2_output


    effects:
      # Pure YAML alternating fade
      - automation:
          name: "Alternating Fade"
          sequence:
            - while:
                condition:
                  lambda: 'return id(dual_led).current_values.is_on();'
                then:
                  - light.turn_on:
                      id: led1
                      brightness: 100%
                      transition_length: 2s
                  - light.turn_on:
                      id: led2
                      brightness: 0%
                      transition_length: 2s
                  - delay: 2s
                  
                  - if:
                      condition:
                        lambda: 'return id(dual_led).current_values.is_on();'
                      then:
                        - light.turn_on:
                            id: led1
                            brightness: 0%
                            transition_length: 2s
                        - light.turn_on:
                            id: led2
                            brightness: 100%
                            transition_length: 2s
                        - delay: 2s
            
            - light.turn_off: led1
            - light.turn_off: led2
      
      
 # Test buttons
button:
  - platform: template
    name: "Start Alternating Fade"
    on_press:
      - light.turn_on:
          id: dual_led
          brightness: 100%
          effect: "Alternating Fade"
  
# Push button on GPIO0
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Push Button"
    on_press:
      - light.toggle: dual_led

# Relay on GPIO12
switch:
  - platform: gpio
    pin: GPIO12
    name: "Relay"
    id: relay_switch
    restore_mode: ALWAYS_OFF  # Start with relay off

