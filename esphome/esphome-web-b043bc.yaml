esphome:
  name: esphome-web-b043bc
  friendly_name: Sonoff1
  min_version: 2025.11.0
  name_add_mac_suffix: false

  # Start flashing LED on boot
  on_boot:
    priority: -100  # Run after everything is initialized
    then:
      - script.execute: led_flash_script  

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

# External component configuration
external_components:
  - source:
      type: local
      path: components
    components: [ interrupt_pwm ]

output:
#  - platform: esp8266_pwm
#    id: led1_output
#    pin: GPIO5
#    frequency: 1000Hz
#  - platform: esp8266_pwm
#    id: led2_output
#    pin: GPIO4
#    frequency: 1000Hz

  - platform: interrupt_pwm
    id: led1_output
    pin: 5
    channel: 0
    min_power: 0.01
    zero_means_zero: true

  - platform: interrupt_pwm
    id: led2_output
    pin: 4
    channel: 1
    min_power: 0.01
    zero_means_zero: true

  - platform: template
    id: combined_output
    type: float
    write_action:
      - output.set_level:
          id: led1_output
          level: !lambda 'return state / 2.0;'
      - output.set_level:
          id: led2_output
          level: !lambda 'return state / 2.0;'

# Status LED on GPIO13
  - platform: gpio
    pin: GPIO13
    id: led_output
    inverted: true

light:
  - platform: binary
    name: "Status LED"
    id: status_led
    output: led_output

# Individual lights (hidden)
  - platform: monochromatic
    id: led1
    output: led1_output
    internal: true
    gamma_correct: 2.0

  - platform: monochromatic
    id: led2
    output: led2_output
    internal: true
    gamma_correct: 2.0

  # Main light
  - platform: monochromatic
    name: "Dual LED Light"
    id: dual_led
    output: combined_output
    restore_mode: RESTORE_DEFAULT_OFF
    
    on_turn_on:
      - script.stop: led_flash_script
      - light.turn_on: status_led

    # Clean turn-off handler
    on_turn_off:
      then:
        - light.turn_off: status_led
        - script.execute: led_flash_script
        # Force both LEDs off immediately
        - light.turn_off: led1
        - light.turn_off: led2
        - output.turn_off: led1_output
        - output.turn_off: led2_output


    effects:
      # Pure YAML alternating fade
      - automation:
          name: "Alternating Fade"
          sequence:
            - while:
                condition:
                  lambda: 'return id(dual_led).current_values.is_on();'
                then:
                  - light.turn_on:
                      id: led1
                      brightness: 100%
                      transition_length: 2s
                  - light.turn_on:
                      id: led2
                      brightness: 0%
                      transition_length: 2s
                  - delay: 2s
                  
                  - if:
                      condition:
                        lambda: 'return id(dual_led).current_values.is_on();'
                      then:
                        - light.turn_on:
                            id: led1
                            brightness: 0%
                            transition_length: 2s
                        - light.turn_on:
                            id: led2
                            brightness: 100%
                            transition_length: 2s
                        - delay: 2s
            
            - light.turn_off: led1
            - light.turn_off: led2
      
      
 # Test buttons
button:
  - platform: template
    name: "Start Alternating Fade"
    on_press:
      - light.turn_on:
          id: dual_led
          brightness: 100%
          effect: "Alternating Fade"
  
# Push button on GPIO0
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Push Button"
    on_press:
      - light.toggle: dual_led

# Relay on GPIO12
switch:
  - platform: gpio
    pin: GPIO12
    name: "Relay"
    id: relay_switch
    restore_mode: ALWAYS_OFF  # Start with relay off

# Script for flashing LED
script:
  - id: led_flash_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - light.turn_on: status_led
            - delay: 100ms  # 0.1 second on
            - light.turn_off: status_led
            - delay: 4900ms  # 4.9 seconds off (total = 5 seconds)
