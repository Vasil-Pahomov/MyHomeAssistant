script:
  # Timer setup script
  - id: timer_setup_script
    mode: restart
    then:
      - lambda: |-
          int stage = id(timer_stage);
          stage = (stage + 1) % 5;  // Cycle through 0-4
          id(timer_stage) = stage;
      - script.execute: timer_acknowledgment
      - delay: 10s  # 10 second timeout
      - lambda: |-
          // Start the actual timer based on stage
          int stage = id(timer_stage);
          int minutes = 0;
          switch(stage) {
            case 0: minutes = 20; break;
            case 1: minutes = 40; break;
            case 2: minutes = 60; break;
            case 3: minutes = 120; break;
            case 4: minutes = 180; break;
          }
          id(auto_off_timer).execute(minutes);
  
  # Timer acknowledgment (blink pattern)
  - id: timer_acknowledgment
    then:
      - lambda: |-
          int stage = id(timer_stage);
          int blinks = 0;
          int duration_ms = 0;
          int pause_ms = 0;
          
          switch(stage) {
            case 0:  // 20 min - 1 blink, 500ms
              blinks = 1;
              duration_ms = 500;
              pause_ms = 500;
              break;
            case 1:  // 40 min - 2 blinks, 500ms each
              blinks = 2;
              duration_ms = 500;
              pause_ms = 500;
              break;
            case 2:  // 1 hour - 1 blink, 1000ms
              blinks = 1;
              duration_ms = 1000;
              pause_ms = 1000;
              break;
            case 3:  // 2 hours - 2 blinks, 1000ms each
              blinks = 2;
              duration_ms = 1000;
              pause_ms = 1000;
              break;
            case 4:  // 3 hours - 3 blinks, 1000ms each
              blinks = 3;
              duration_ms = 1000;
              pause_ms = 1000;
              break;
          }
          
          for(int i = 0; i < blinks; i++) {
            id(dual_led).turn_off().perform();
            delay(duration_ms);
            id(dual_led).turn_on().set_brightness(id(current_brightness)).perform();
            if(i < blinks - 1) {
              delay(pause_ms);
            }
          }
  
  # Auto-off timer
  - id: auto_off_timer
    mode: restart
    parameters:
      minutes: int
    then:
      - delay: !lambda 'return minutes * 60 * 1000;'
      - light.turn_off: dual_led
      - lambda: |-
          id(timer_stage) = 0;      
      
  #dim until off at night
  - id: gradual_dim
    mode: restart
    then:
      - delay: 10min
      - while:
          condition:
            and:
              - light.is_on: dual_led
              - lambda: 'return id(dual_led).current_values.get_brightness() > 0.05;'
          then:
            - light.dim_relative:
                id: dual_led
                relative_brightness: -1%
                transition_length: 0s
            - delay: 5s
