esphome:
  name: pollightcontrol
  friendly_name: PolLightControl

esp8266:
  board: esp01_1m

# Enable logging
logger:
  level: DEBUG  # Shows all messages (DEBUG, INFO, WARN, ERROR)
  # level: INFO  # Shows only INFO, WARN, ERROR (less verbose)
  logs:
    automation: DEBUG  # Specifically set automation logs to DEBUG level

# Enable Home Assistant API
api:
  encryption:
    key: "EM7iHYWwe9V/PLQVt3KqRsGA0sqO2bn8aUJJ96+FgUo="
  reboot_timeout: 120min

ota:
  - platform: esphome
    password: "c7e142b857c8bc4068fec2fb2222dfbf"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Pollightcontrol Fallback Hotspot"
    password: "TZh0XCoVlcXQ"

captive_portal:

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: components
    components: [ interrupt_pwm ]

sun:
  latitude: 51.75
  longitude: 19.46667
  id: sun_position

time:
  - platform: homeassistant
    id: homeassistant_time
  - platform: sntp
    id: sntp_time
    
output:
#  - platform: esp8266_pwm
#    id: led1_output
#    pin: GPIO5
#    frequency: 1000Hz
#  - platform: esp8266_pwm
#    id: led2_output
#    pin: GPIO4
#    frequency: 1000Hz

  - platform: interrupt_pwm
    id: led1_output
    pin: 5
    channel: 0
    min_power: 0.01
    zero_means_zero: true

  - platform: interrupt_pwm
    id: led2_output
    pin: 4
    channel: 1
    min_power: 0.01
    zero_means_zero: true

  - platform: template
    id: combined_output
    type: float
    write_action:
      - output.set_level:
          id: led1_output
          level: !lambda 'return state / 2.0;'
      - output.set_level:
          id: led2_output
          level: !lambda 'return state / 2.0;'
  
  - platform: interrupt_pwm
    id: balco1
    pin: 13
    channel: 2

  - platform: interrupt_pwm
    pin: 14
    id: balco2
    channel: 3

sensor:
  - platform: adc
    pin: GPIO17
    name: "External Brightness"
    id: ext_brightness
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 30
        
light:
  - platform: monochromatic
    id: balc1
    name: "B1"
    output: balco1
    gamma_correct: 1.0

  - platform: monochromatic
    id: balc2
    name: "B2"
    output: balco2
    gamma_correct: 1.0

# Individual lights (hidden)
  - platform: monochromatic
    id: led1
    output: led1_output
    name: "LED1"
    internal: true
    gamma_correct: 1.0

  - platform: monochromatic
    id: led2
    output: led2_output
    name: "LED2"
    internal: true
    gamma_correct: 1.0

  # Main light
  - platform: monochromatic
    name: "Dual LED Light"
    id: dual_led
    output: combined_output
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 1.0
    default_transition_length: 10s
    
    # Clean turn-off handler
    on_turn_off:
      then:
        # Force both LEDs off immediately
        - light.turn_off: led1
        - light.turn_off: led2
        - output.turn_off: led1_output
        - output.turn_off: led2_output


    effects:
      # Pure YAML alternating fade
      - automation:
          name: "Alternating Fade"
          sequence:
            - while:
                condition:
                  lambda: 'return id(dual_led).current_values.is_on();'
                then:
                  - light.turn_on:
                      id: led1
                      brightness: 100%
                      transition_length: 5s
                  - light.turn_on:
                      id: led2
                      brightness: 0%
                      transition_length: 5s
                  - delay: 10s
                  
                  - if:
                      condition:
                        lambda: 'return id(dual_led).current_values.is_on();'
                      then:
                        - light.turn_on:
                            id: led1
                            brightness: 0%
                            transition_length: 5s
                        - light.turn_on:
                            id: led2
                            brightness: 100%
                            transition_length: 5s
                        - delay: 10s
            
            - light.turn_off: led1
            - light.turn_off: led2    

# Automation script
script:
  - id: check_and_control_lights
    mode: restart
    then:
      - lambda: |-
          float brightness = id(ext_brightness).state;
          auto time = id(homeassistant_time).now();
          
          ESP_LOGD("automation", "Brightness sensor: %.3fV", brightness);

          if (brightness >= 0.025) {
            id(balc1).turn_off().perform();
            id(balc2).turn_off().perform();
          } else {
            id(balc1).turn_on().perform();
            id(balc2).turn_on().perform();
          }

          // Brightness above threshold - curtain off
          if (brightness >= 0.05) {
            id(dual_led).turn_off().perform();
            return;
          }
          
          // Get current hour and day of week
          int hour = time.hour;
          int minute = time.minute;
          int day_of_week = time.day_of_week; // 1=Sunday, 7=Saturday
          
          // Check if it's weekend (Saturday or Sunday)
          bool is_weekend = (day_of_week == 1 || day_of_week == 7);
          
          // Check if it's before 10pm (22:00)
          bool is_before_10pm = (hour < 22);
          
          // Check if it's between 10pm and 6:30am
          bool is_night_time = (hour >= 22 || hour < 6 || (hour == 6 && minute < 30));
          
          ESP_LOGD("automation", "is_weekend=%d, is_before_10pm=%d, is_night_time=%d", is_weekend,is_before_10pm, is_night_time);

          if (is_night_time) {
            // night time
            ESP_LOGD("automation", "Night");
            id(dual_led).turn_on().set_brightness(0.1).perform();
          }
          // Before 10pm - run cross-fade animation
          else if (is_before_10pm) {
            //if (!id(dual_led).current_values.is_on() || 
            //  strcmp(id(dual_led).get_effect_name().c_str(), "Alternating Fade") != 0) {
            //  id(dual_led).turn_on().set_effect("Alternating Fade").perform();
            //  ESP_LOGD("automation", "AltFade for evening");
            //}
            ESP_LOGD("automation", "100% brightness for evening");
            id(dual_led).turn_on().set_brightness(1.0).perform();
          }
          // morning but still dark
          else {
            if (is_weekend)
            {
              ESP_LOGD("automation", "Weekday morning");
              id(dual_led).turn_on().set_brightness(1.0).perform();
            }
          }

# Optional: Also trigger automation on time change (every minute)
interval:
  - interval: 60s
    then:
      - script.execute: check_and_control_lights