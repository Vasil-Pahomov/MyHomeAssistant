  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Test-Esp8266 Fallback Hotspot"
    password: "WzPDNGgIfOj9"

captive_portal:
    
# External component configuration
external_components:
  - source:
      type: local
      path: components
    components: [ interrupt_pwm ]

web_server:
  port: 80
  

output:
#  - platform: esp8266_pwm
#    id: led1_output
#    pin: GPIO5
#    frequency: 1000Hz
#  - platform: esp8266_pwm
#    id: led2_output
#    pin: GPIO4
#    frequency: 1000Hz

  - platform: interrupt_pwm
    id: led1_output
    pin: 5
    channel: 0
    min_power: 0.01
    zero_means_zero: true

  - platform: interrupt_pwm
    id: led2_output
    pin: 4
    channel: 1
    min_power: 0.01
    zero_means_zero: true
   
  - platform: template
    id: combined_output
    type: float
    write_action:
      - output.set_level:
          id: led1_output
          level: !lambda 'return state / 2.0;'
      - output.set_level:
          id: led2_output
          level: !lambda 'return state / 2.0;'

# Individual lights (hidden)
light:
  - platform: monochromatic
    id: led1
    output: led1_output
    internal: true
    gamma_correct: 2.0

  - platform: monochromatic
    id: led2
    output: led2_output
    internal: true
    gamma_correct: 2.0

  # Main light
  - platform: monochromatic
    name: "Dual LED Light"
    id: dual_led
    output: combined_output
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 2.0
    
    # Clean turn-off handler
    on_turn_off:
      then:
        # Force both LEDs off immediately
        - light.turn_off: led1
        - light.turn_off: led2
        - output.turn_off: led1_output
        - output.turn_off: led2_output


    effects:
      # Pure YAML alternating fade
      - automation:
          name: "Alternating Fade"
          sequence:
            - while:
                condition:
                  lambda: 'return id(dual_led).current_values.is_on();'
                then:
                  - light.turn_on:
                      id: led1
                      brightness: 100%
                      transition_length: 2s
                  - light.turn_on:
                      id: led2
                      brightness: 0%
                      transition_length: 2s
                  - delay: 2s
                  
                  - if:
                      condition:
                        lambda: 'return id(dual_led).current_values.is_on();'
                      then:
                        - light.turn_on:
                            id: led1
                            brightness: 0%
                            transition_length: 2s
                        - light.turn_on:
                            id: led2
                            brightness: 100%
                            transition_length: 2s
                        - delay: 2s
            
            - light.turn_off: led1
            - light.turn_off: led2
      
      
 # Test buttons
button:
  - platform: template
    name: "Start Alternating Fade"
    on_press:
      - light.turn_on:
          id: dual_led
          brightness: 100%
          effect: "Alternating Fade"
  
# IR Receiver on GPIO14
remote_receiver:
  pin:
    number: GPIO14
    inverted: true
    mode:
      input: true
      pullup: false
  dump: all  # This will show all received codes in the log  